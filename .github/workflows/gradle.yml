name: Java CI with Gradle

on: [push, pull_request]

jobs:
  build:

     runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v2

  - name: Set up JDK 11
    uses: actions/setup-java@v2
    with:
      java-version: '11'
      distribution: 'adopt'

  - name: Grant execute permission for gradlew
    run: chmod +x gradlew

  - name: Start SUT
    run: java -jar ./artifacts/app-card-delivery.jar &

  - name: Wait for SUT to be ready
    run: |
      echo "Waiting for SUT to start..."
      for i in {1..30}; do
        if curl -sSf http://localhost:9999 >/dev/null; then
          echo "SUT is up"
          exit 0
        fi
        echo "Waiting..."
        sleep 2
      done
      echo "SUT did not start in time" >&2
      exit 1

  - name: Build and run tests
    run: ./gradlew test --info -Dselenide.headless=true --no-daemon